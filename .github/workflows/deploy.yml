name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  API_ECR_REPO: frogbets-api
  FRONTEND_ECR_REPO: frogbets-frontend

permissions:
  id-token: write   # necessário para OIDC
  contents: read

jobs:
  # ── 1. Testes ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Test (.NET)
        run: dotnet test --configuration Release --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Install & Test
        working-directory: frontend
        run: |
          npm ci
          npm run test

  # ── 2. Build & Push imagens ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      api-image: ${{ steps.build-api.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get API URL for frontend build
        id: api-url
        run: |
          # Tenta buscar a URL do serviço ECS via SSM Parameter Store
          URL=$(aws ssm get-parameter --name "/frogbets/api-url" --query "Parameter.Value" --output text 2>/dev/null || echo "")
          echo "value=${URL}" >> $GITHUB_OUTPUT

      # ── API ──────────────────────────────────────────────────────────────
      - name: Build & Push API image
        id: build-api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$API_ECR_REPO:$IMAGE_TAG"
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile.api \
            --tag "$IMAGE" \
            --tag "$REGISTRY/$API_ECR_REPO:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build & Push Frontend image
        id: build-frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG"
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile.frontend \
            --build-arg "VITE_API_URL=${{ steps.api-url.outputs.value }}" \
            --tag "$IMAGE" \
            --tag "$REGISTRY/$FRONTEND_ECR_REPO:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --progress=plain \
            --push .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 3. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy API to ECS
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          EXECUTION_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/frogbets-ecs-execution-role"
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

          cat > /tmp/ecs-task-api.json << EOF
          {
            "family": "frogbets-api",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "512", "memory": "1024",
            "executionRoleArn": "$EXECUTION_ROLE_ARN",
            "containerDefinitions": [{
              "name": "frogbets-api",
              "image": "${{ needs.build-and-push.outputs.api-image }}",
              "portMappings": [{"containerPort": 8080, "protocol": "tcp"}],
              "environment": [
                {"name": "ASPNETCORE_ENVIRONMENT", "value": "Production"},
                {"name": "Jwt__Issuer", "value": "FrogBets"},
                {"name": "Jwt__Audience", "value": "FrogBets"},
                {"name": "Jwt__ExpirationMinutes", "value": "60"}
              ],
              "secrets": [
                {"name": "ConnectionStrings__DefaultConnection", "valueFrom": "arn:aws:ssm:$AWS_REGION:$ACCOUNT_ID:parameter/frogbets/db-connection-string"},
                {"name": "Jwt__Key", "valueFrom": "arn:aws:ssm:$AWS_REGION:$ACCOUNT_ID:parameter/frogbets/jwt-key"}
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/frogbets-api",
                  "awslogs-region": "$AWS_REGION",
                  "awslogs-stream-prefix": "ecs",
                  "awslogs-create-group": "true"
                }
              },
              "essential": true
            }]
          }
          EOF

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/ecs-task-api.json \
            --region $AWS_REGION \
            --query "taskDefinition.taskDefinitionArn" --output text)

          aws ecs update-service \
            --cluster frogbets \
            --service frogbets-api \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

          aws ecs wait services-stable \
            --cluster frogbets \
            --services frogbets-api \
            --region $AWS_REGION

      - name: Deploy Frontend to ECS
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          EXECUTION_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/frogbets-ecs-execution-role"

          cat > /tmp/ecs-task-frontend.json << EOF
          {
            "family": "frogbets-frontend",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256", "memory": "512",
            "executionRoleArn": "$EXECUTION_ROLE_ARN",
            "containerDefinitions": [{
              "name": "frogbets-frontend",
              "image": "${{ needs.build-and-push.outputs.frontend-image }}",
              "portMappings": [{"containerPort": 80, "protocol": "tcp"}],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/frogbets-frontend",
                  "awslogs-region": "$AWS_REGION",
                  "awslogs-stream-prefix": "ecs",
                  "awslogs-create-group": "true"
                }
              },
              "essential": true
            }]
          }
          EOF

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/ecs-task-frontend.json \
            --region $AWS_REGION \
            --query "taskDefinition.taskDefinitionArn" --output text)

          aws ecs update-service \
            --cluster frogbets \
            --service frogbets-frontend \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

          aws ecs wait services-stable \
            --cluster frogbets \
            --services frogbets-frontend \
            --region $AWS_REGION
