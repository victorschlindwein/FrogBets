name: Build & Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  API_ECR_REPO: frogbets-api
  FRONTEND_ECR_REPO: frogbets-frontend

permissions:
  id-token: write   # necessário para OIDC
  contents: read

jobs:
  # ── 1. Testes ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Test (.NET)
        run: dotnet test --configuration Release --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Install & Test
        working-directory: frontend
        run: |
          npm ci
          npm run test

  # ── 2. Build & Push imagens ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      api-image: ${{ steps.build-api.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get API URL for frontend build
        id: api-url
        run: |
          # Tenta buscar a URL do serviço ECS via SSM Parameter Store
          URL=$(aws ssm get-parameter --name "/frogbets/api-url" --query "Parameter.Value" --output text 2>/dev/null || echo "")
          echo "value=${URL}" >> $GITHUB_OUTPUT

      # ── API ──────────────────────────────────────────────────────────────
      - name: Build & Push API image
        id: build-api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$API_ECR_REPO:$IMAGE_TAG"
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile.api \
            --tag "$IMAGE" \
            --tag "$REGISTRY/$API_ECR_REPO:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build & Push Frontend image
        id: build-frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$FRONTEND_ECR_REPO:$IMAGE_TAG"
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile.frontend \
            --build-arg "VITE_API_URL=${{ steps.api-url.outputs.value }}" \
            --tag "$IMAGE" \
            --tag "$REGISTRY/$FRONTEND_ECR_REPO:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --progress=plain \
            --push .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── 3. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs-task-api.json
          service: frogbets-api
          cluster: frogbets
          wait-for-service-stability: true
          image: ${{ needs.build-and-push.outputs.api-image }}
          container-name: frogbets-api

      - name: Deploy Frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: infra/ecs-task-frontend.json
          service: frogbets-frontend
          cluster: frogbets
          wait-for-service-stability: true
          image: ${{ needs.build-and-push.outputs.frontend-image }}
          container-name: frogbets-frontend
