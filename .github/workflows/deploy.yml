name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  API_IMAGE: frogbets-api
  FRONTEND_IMAGE: frogbets-frontend

jobs:
  # ── 1. Testes ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Test (.NET)
        run: dotnet test --configuration Release --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Install & Test
        working-directory: frontend
        run: |
          npm ci
          npm run test -- --run

  # ── 2. Build & Push imagens ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      api-tag: ${{ steps.meta-api.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (para buscar URL da API)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Buscar URL pública da API
        id: api-url
        run: |
          FQDN=$(az containerapp show \
            --name frogbets-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")
          if [ -n "$FQDN" ]; then
            echo "value=https://${FQDN}" >> $GITHUB_OUTPUT
          else
            # Primeiro deploy: usa o secret configurado manualmente
            echo "value=${{ secrets.ALLOWED_ORIGINS }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ──────────────────────────────────────────────────────────────
      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ steps.api-url.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: frogbets-api
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:latest
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=FrogBets
            Jwt__Audience=FrogBets
            Jwt__ExpirationMinutes=60
            AllowedOrigins=${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy Frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: frogbets-frontend
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest
