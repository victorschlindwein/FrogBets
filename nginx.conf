# Rate limiting: max 10 req/s por IP, burst de 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Rate limiting mais restrito para autenticação: 5 req/min por IP
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Limita tamanho máximo do body (evita ataques de payload gigante)
    client_max_body_size 1M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
